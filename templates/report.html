<!DOCTYPE html>
<html>
<head>
    <title>Expense Report</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<h1>Expense Report</h1>

<table>

<tr>
    <th>Expense</th>
    <th>Amount</th>
</tr>

{% for expense in expenses %}
<tr>
    <td>{{ expense[1] }}</td>
    <td>₹{{ expense[2] }}</td>
</tr>
{% endfor %}

</table>

<h2>Total Expense: ₹{{ total }}</h2>

<a href="/">
    Back To Home
</a>

</body>
</html>
